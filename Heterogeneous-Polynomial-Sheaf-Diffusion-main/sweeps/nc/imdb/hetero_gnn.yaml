# Heterogeneous GNN Baselines Sweep for IMDB
# Models: HAN, HGT, HeteroGAT, HeteroGraphSAGE

name: HeteroGNN-IMDB
program: polynsd/scripts/run_gnn_nc.py
command:
  - ${env}
  - uv
  - run
  - python
  - ${program}
  - ${args_no_hyphens}
method: random
metric:
  name: val/macro_f1
  goal: maximize

parameters:
  model:
    distribution: categorical
    values:
      - han
      - hgt
      - hetero_gat
      - hetero_sage
  
  dataset:
    value: imdb
  
  dataset.homogeneous:
    value: false
  
  model.layers:
    distribution: int_uniform
    min: 2
    max: 8
  
  model.hidden_channels:
    distribution: categorical
    values: [8, 16, 32, 64]
  
  model.dropout:
    distribution: uniform
    min: 0
    max: 0.9
  
  model.input_dropout:
    distribution: uniform
    min: 0
    max: 0.9
  
  model.initial_dropout:
    distribution: uniform
    min: 0
    max: 0.9
  
  model.output_dim:
    distribution: categorical
    values: [32, 64, 128]
  
  # Attention heads (for HAN, HGT, HeteroGAT)
  model.heads:
    distribution: categorical
    values: [2, 4, 8]
  
  trainer.max_epochs:
    value: 500
  
  optimization.learning_rate:
    distribution: categorical
    values: [1e-05, 5e-05, 0.0001, 0.0005, 0.001, 0.005, 0.01, 0.05]
  
  optimization.weight_decay:
    distribution: categorical
    values: [1e-05, 5e-05, 0.0001, 0.0005, 0.001, 0.005]

early_terminate:
  type: hyperband
  max_iter: 27
  s: 2