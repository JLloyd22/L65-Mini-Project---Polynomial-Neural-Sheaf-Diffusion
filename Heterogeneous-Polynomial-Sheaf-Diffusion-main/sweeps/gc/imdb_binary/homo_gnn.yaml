# Homogeneous GNN Baselines Sweep for IMDB_Binary (Graph Classification)
# Models: GCN, GAT, GIN, GraphSAGE
# Note: RGCN excluded as it requires explicit relations

name: HomoGNN-IMDB_Binary-GC
program: polynsd/scripts/run_gnn_gc.py
command:
  - ${env}
  - uv
  - run
  - python
  - ${program}
  - ${args_no_hyphens}
method: random
metric:
  name: valid/macro-f1
  goal: maximize

parameters:
  model:
    distribution: categorical
    values:
      - gcn
      - gat
      - gin
      - sage
  
  dataset:
    value: imdb_binary
  
  model.layers:
    distribution: int_uniform
    min: 2
    max: 8
  
  model.hidden_channels:
    distribution: categorical
    values: [8, 16, 32, 64]
  
  model.dropout:
    distribution: uniform
    min: 0
    max: 0.9
  
  model.input_dropout:
    distribution: uniform
    min: 0
    max: 0.9
  
  model.initial_dropout:
    distribution: uniform
    min: 0
    max: 0.9
  
  model.output_dim:
    distribution: categorical
    values: [32, 64, 128]
  
  # GAT-specific parameter (will be ignored by other models)
  model.heads:
    distribution: categorical
    values: [2, 4, 8]
  
  pooling:
    distribution: categorical
    values: [mean, max, add, attention]
  
  trainer.max_epochs:
    value: 500
  
  optimization.learning_rate:
    distribution: categorical
    values: [1e-05, 5e-05, 0.0001, 0.0005, 0.001, 0.005, 0.01, 0.05]
  
  optimization.weight_decay:
    distribution: categorical
    values: [1e-05, 5e-05, 0.0001, 0.0005, 0.001, 0.005]

early_terminate:
  type: hyperband
  max_iter: 27
  s: 2
