name: BundleSheaf-LastFM
program: polynsd/scripts/run_sheaf_lp.py
method: random
metric:
  goal: maximize
  name: val/mrr
parameters:
  model:
    value: ind_bundle_sheaf
  sheaf_learner:
    distribution: categorical
    values:
      - local_concat
      - attention
      #- edge_weight
      #- quadratic
      - type_concat
      - type_ensemble
      - edge_type_concat
      - node_type_concat
      - node_type
      - edge_type
      - types_only
      - attention_type_concat
      - attention_type_ensemble
      - attention_edge_encoding
      - attention_node_encoding
      - attention_types_only
      - attention_node_type
      - attention_edge_type
  dataset:
    value: last_fm
  model.args.d:
    distribution: int_uniform
    min: 2
    max: 5
  model.args.layers:
    distribution: int_uniform
    min: 2
    max: 8
  model.args.hidden_channels:
    distribution: categorical
    values: [ 8, 16, 32, 64 ]
  model.args.input_dropout:
    distribution: uniform
    min: 0
    max: 0.9
  model.args.output_dim:
    distribution: categorical
    values: [ 32, 64, 128 ]
  model.args.dropout:
    distribution: uniform
    min: 0
    max: 0.9
  model.args.initial_dropout:
    distribution: uniform
    min: 0
    max: 0.9
  optimization.learning_rate:
    distribution: categorical
    values: [1e-05, 5e-05, 0.0001, 0.0005, 0.001, 0.005, 0.01, 0.05]
  optimization.weight_decay:
    distribution: categorical
    values: [1e-05, 5e-05, 0.0001, 0.0005, 0.001, 0.005]
  trainer.max_epochs:
    value: 500
early_terminate:
  type: hyperband
  max_iter: 27
  s: 2
command:
  - uv
  - run
  - python
  - ${program}
  - ${args_no_hyphens}

