# @package _global_

# Bundle sheaf diffusion experiment for PROTEINS dataset
defaults:
  - override /model: sheaf_bundle
  - override /dataset: proteins

tags: [ sheaf, bundle, PROTEINS, graph_classification ]

hidden_dim: 64
pooling: mean

model:
  args:
    hidden_dim: ${hidden_dim}
    num_layers: 4
    dropout: 0.3
    left_weights: true
    right_weights: true
    sheaf_learner: "local_concat"
    sheaf_type: "BundleSheafDiffusion"

trainer:
  max_epochs: 200
  
callbacks:
  early_stopping:
    patience: 50
  model_checkpoint:
    monitor: valid/accuracy
    mode: max
    dirpath: checkpoints/sheafgc_bundle_proteins/
