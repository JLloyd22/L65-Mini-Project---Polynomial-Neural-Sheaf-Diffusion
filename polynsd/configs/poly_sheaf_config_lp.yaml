defaults:
  - _self_
  - trainer: trainer
  - model: ind_bundle_poly_sheaf  #use inductive models for Link Prediction
  - dataset: movie_lens #last_fm
  - callbacks: sheaf_lp
  - logger: wandb
  - experiment: null

logger: wandb

dataset:
  homogeneous: true

sheaf_learner: attention_type_concat #type_concat #attention_type_concat #local_concat

recsys_metrics: true
hidden_dim: 256
tags:
